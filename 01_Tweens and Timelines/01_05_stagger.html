<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP | Basic Tween</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;background-color: #f0f0f0;
            padding:30px 0;
        }
        .main {
            max-width: 85%;
            margin: 0 auto;
            width: 100%;
            height:80vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: end;
            flex-direction: row;
            gap: 30px;
            
        }

        .blueBox {
            width: 100px;
            height: 100px;
            background-color: rgb(11, 132, 201);
            border-radius:30px;
        }
        .redBox {
            width: 100px;
            height: 100px;
            background-color: rgb(201, 11, 11);
            border-radius:30px;
        }
        .yellowBox {
            width: 100px;
            height: 100px;
            background-color: rgb(229, 229, 3);
            border-radius:30px;
        }
        .orangeBox {
            width: 100px;
            height: 100px;
            background-color: rgb(192, 123, 3);
            border-radius:30px;
        }
        .greenBox {
            width: 100px;
            height: 100px;
            background-color: rgb(6, 159, 6);
            border-radius:30px;
        }
        
    </style>
</head>
<body>
    <div class="main">
        <div class="box blueBox"></div>
        <div class="box redBox"></div>
        <div class="box yellowBox"></div>
        <div class="box orangeBox"></div>
        <div class="box greenBox"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
        //stagger is used to create a delay between the start times of multiple animations, allowing for a staggered effect. It can be applied to a group of elements, and the delay can be specified in seconds or milliseconds.
        gsap.to(".box", {
            y:-200,
            duration: 2,
            // stagger: 0.2,
            stagger: {
                amount:1, // total duration of the staggered animation
                // each: 0.2, // delay between the start of each animation
                from: "center", // "start", "end", "center", "edges", or a specific index
                axis: "x" // "x" or "y" to stagger along a specific axis
            }
        })
    </script>    
</body>
</html>
