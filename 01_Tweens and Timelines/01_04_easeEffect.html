<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP | Basic Tween</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;background-color: #f0f0f0;
            padding:30px 0;
        }
        .main {
            max-width: 85%;
            margin: 0 auto;
            width: 100%;
            height:80vh;
            position: relative;
            display: flex;
            justify-content: start;
            flex-direction: column;
            gap: 20px;
            
        }

        .blueBox {
            width: 100px;
            height: 100px;
            background-color: rgb(11, 132, 201);
            border-radius:30px;
        }
        .redBox {
            width: 100px;
            height: 100px;
            background-color: rgb(201, 11, 11);
            border-radius:30px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="blueBox"></div>
        <div class="redBox"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
        //Ease effect is used to create a more natural and realistic animation by controlling the rate of change of the animation over time. It allows you to specify how the animation should accelerate or decelerate at different points in time, creating a more dynamic and engaging visual experience. View the documentation for more information & check types of Eases: https://gsap.com/docs/v3/Eases
        gsap.to(".blueBox", {
        x:600,
        duration: 2,
        rotation: 360,
        yoyo:true,
        repeat:-1,
        ease: "elastic.inOut(0.3,1)",
    })
    gsap.to(".redBox", {
        x:600,
        duration: 2,
        rotation: 360,
        yoyo:true,
        repeat:-1,
        ease: "power2.out",
    })
    </script>    
</body>
</html>
