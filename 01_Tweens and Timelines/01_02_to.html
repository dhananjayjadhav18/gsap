<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP | Basic Tween</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;background-color: #f0f0f0;
        }
        .main {
            max-width: 85%;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: start;
            align-items: center;
        }
        .box1 {
            width: 100px;
            height: 100px;
            background-color: rgb(11, 132, 201);
            border-radius:30px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
        // gsap.to() method is used to animate the properties of an element from its current state to a specified state over a given duration.
        gsap.to(".box1", {
            x:600,
            y:100,
            duration: 2,
            scale:3,
            repeat:-1,
            opacity:0,
            rotation: 360,
            yoyo:true
        })
    </script>    
</body>
</html>
