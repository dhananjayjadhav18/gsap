<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP | Basic Tween</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;background-color: #f0f0f0;
            padding:30px 0;
        }
        .main {
            max-width: 85%;
            margin: 0 auto;
            width: 100%;
            height:80vh;
            position: relative;
            display: flex;
            flex-direction: row;   
            gap:40px;        
        }

        .blueBox {
            width: 600px;
            height: 600px;
            background-color:#a0e1f0;
            border-radius:30px;
            display: flex;
            justify-content: start;
            align-items: center;
        }
        .btnBox {display: flex; flex-direction:row; gap: 10px;}

        .btnCircle {width:150px; height: 150px;  background-color: #eda9a9;  border:5px solid #d726e3; border-radius: 150px;  color: #333333; font-size: 16px; cursor: pointer;  position: relative;}
        .hoverBox {width:100%; height: 100%; background-color: #333333; border-radius: 150px; position: absolute; top:0; left:0; opacity:1; transition: all 0.3s ease; z-index:1; opacity:0; transform: scale(0);}
        .restartTypo {color: #FFFFFF;z-index: 99; position: relative;   background-color: transparent;text-align: center; font-size: 18px; font-family: monospace;letter-spacing: 2px;}
    </style>
</head>
<body>
    <div class="main">
        <div class="blueBox">
            <img src="./../images/car.png" id="car" alt="car" style="object-fit:cover; max-width:500px;background-color:transparent;">
        </div>
        <div class="blueBox" style="display: flex; justify-content: center; align-items: center;">
            <div class="btnCircle" id="">
             <div class="hoverBox"></div>
             <div class="restartTypo">Restart</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script>
     const car = gsap.to("#car", {
            transformOrigin:"left bottom",
            rotation: -40,
            duration: 2,
            repeat: -1,
            yoyo: true,
            ease: "back.in(1)",
        })
        document.addEventListener("car", () => car.restart());


        gsap.to(".hoverBox", {
          opacity:1,
          scale:1,
          duration:1.5,
          ease:"power2.inOut",
        })
        document.addEventListener("hoverBox", () => hoverBox.restart());
    </script>    
</body>
</html>
